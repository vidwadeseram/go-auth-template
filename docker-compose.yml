services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8005:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
